StylesPath = config/vale/styles
MinAlertLevel = warning
Vocab = Elements
Packages = Google, write-good

[*.md]
BasedOnStyles = Vale, Google, write-good, Elements
# Ignore Eleventy shortcodes and template expressions
TokenIgnores = (\{%[\s\S]*?%\}), (\{\{[^}]*\}\})
# Disable auto-generated vocabulary case enforcement (custom Elements rules handle terminology)
Vale.Terms = NO
# Disable overly noisy rules for documentation
Google.Headings = NO
Google.WordList = NO
# Summary rules only apply to examples files
Elements.SummaryStyle = NO
Elements.SummaryActionable = NO
Elements.SummaryGerund = NO
Elements.SummaryImplementation = NO

[*.ts]
BasedOnStyles = Vale, write-good, Elements
write-good.TooWordy = error
write-good.Passive = error
# Reduced rule set for JSDoc - disable rules that produce noise on code identifiers
Vale.Spelling = NO
Vale.Terms = NO
# Summary rules only apply to examples files
Elements.SummaryStyle = NO
Elements.SummaryActionable = NO
Elements.SummaryGerund = NO
Elements.SummaryImplementation = NO

# Examples files: skip HTML tags and template expressions to reduce false positives
[**/src/**/*.examples.ts]
TokenIgnores = (<[/\w][^>]*>), (\$\{[^}]*\})
Elements.SummaryStyle = YES
Elements.SummaryActionable = YES
Elements.SummaryGerund = YES
Elements.SummaryImplementation = YES
