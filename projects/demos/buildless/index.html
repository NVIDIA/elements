<!DOCTYPE html>
<html lang="en" nve-theme="dark">
  <head>
    <title>Import Map Starter + @elements/elements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
    <link rel="stylesheet" type="text/css" href="./node_modules/@elements/elements/dist/index.css" />
    <script type="importmap">
      {
        "imports": {
          "lit": "https://unpkg.com/lit@2.7.0/index.js?module",
          "lit/": "https://unpkg.com/lit@2.7.0/",
          "lit/directive.js": "https://unpkg.com/lit@2.7.0/directive.js?module",
          "lit-html/directive.js": "https://unpkg.com/lit-html@2.7.0/directive.js?module",
          "lit/decorators/property.js": "https://unpkg.com/lit@2.7.0/decorators/property.js?module",
          "lit/decorators/state.js": "https://unpkg.com/lit@2.7.0/decorators/state.js?module",
          "@lit-labs/motion": "https://unpkg.com/@lit-labs/motion@1.0.3/index.js?module",
          "@floating-ui/dom": "https://unpkg.com/@floating-ui/dom@1.2.5/dist/floating-ui.dom.esm.js?module",
          "@elements/elements/": "./node_modules/@elements/elements/dist/"
        }
      }
    </script>
  </head>
  <body nve-text="body" nve-layout="column gap:md pad:lg">
    <nve-button>open</nve-button>

    <nve-dialog hidden modal closable>
      hello world!
    </nve-dialog>

    <script type="module">
      import '@elements/elements/button/define.js';
      import '@elements/elements/dialog/define.js';

      const button = document.querySelector('nve-button');
      const dialog = document.querySelector('nve-dialog');

      button.addEventListener('click', () => dialog.hidden = false);
      dialog.addEventListener('close', () => dialog.hidden = true);
    </script>
  </body>
</html>
