<!DOCTYPE html>
<html lang="en" mlv-theme="dark">
  <head>
    <title>Import Map Starter + @elements/elements</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon"> 
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@elements/elements@0.19.0/dist/index.css" />
    <script type="importmap">
      {
        "imports": {
          "@elements/elements": "https://https://esm.sh/@elements/elements@0.19.0",
          "@elements/elements/": "https://https://esm.sh/@elements/elements@0.19.0/",
          "lit": "https://https://esm.sh/lit@3.0.0/",
          "lit/": "https://https://esm.sh/lit@3.0.0/"
        },
        "scopes": {
          "https://https://esm.sh/": {
            "@floating-ui/dom": "https://https://esm.sh/@floating-ui/dom@1.5.3",
            "@lit-labs/motion": "https://https://esm.sh/@lit-labs/motion@1.0.5",
            "composed-offset-position": "https://https://esm.sh/composed-offset-position@0.0.4",
            "lit": "https://https://esm.sh/lit@3.1.0",
            "lit/": "https://https://esm.sh/lit@3.1.0/",
            "@floating-ui/core": "https://https://esm.sh/@floating-ui/core@1.5.0",
            "@floating-ui/utils": "https://https://esm.sh/@floating-ui/utils@0.1.6",
            "@floating-ui/utils/dom": "https://https://esm.sh/@floating-ui/utils@0.1.6/dom",
            "@lit/reactive-element": "https://https://esm.sh/@lit/reactive-element@2.0.0",
            "@lit/reactive-element/decorators/": "https://https://esm.sh/@lit/reactive-element@2.0.0/decorators/",
            "lit-element/lit-element.js": "https://https://esm.sh/lit-element@4.0.0/lit-element.js",
            "lit-html": "https://https://esm.sh/lit-html@3.1.0",
            "lit-html/": "https://https://esm.sh/lit-html@3.1.0/"
          }
        }
      }
    </script>
  </head>
  <body mlv-text="body" mlv-layout="column gap:md pad:lg">
    <mlv-button>open</mlv-button>

    <mlv-dialog hidden modal closable>
      hello world!
    </mlv-dialog>

    <script type="module">
      import '@elements/elements/button/define.js';
      import '@elements/elements/dialog/define.js';

      const button = document.querySelector('mlv-button');
      const dialog = document.querySelector('mlv-dialog');

      button.addEventListener('click', () => dialog.hidden = false);
      dialog.addEventListener('close', () => dialog.hidden = true);
    </script>
  </body>
</html>
