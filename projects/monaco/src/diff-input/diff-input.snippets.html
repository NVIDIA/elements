<template name="Monaco Input" prefix="monaco" description="Basic Monaco Editor input" type="pattern">
  <nve-monaco-editor language="${1:Language}" value="${2:Value}"></nve-monaco-editor>
</template>

<template
  name="Monaco Diff Input Control"
  prefix="monaco"
  description="Basic Monaco Editor diff input control"
  type="pattern">
  <nve-control style="width: 100%;">
    <label>${1:Label}</label>
    <nve-monaco-diff-input
      nve-control
      name="${2:Name}"
      language="${3:Language}"
      original="${4:Original}"
      line-numbers="on"
      value="${5:Value}"></nve-monaco-diff-input>
    <nve-control-message>${5:Message}</nve-control-message>
  </nve-control>
</template>
