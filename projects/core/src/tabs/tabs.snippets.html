<template
  name="Tabs"
  prefix="tabs"
  description="Tabs provide a selection UX, typically used for swapping content shown on a page, or within a navigation context."
  type="pattern">
  <nve-tabs>
    <nve-tabs-item selected>${1:Tab 1}</nve-tabs-item>
    <nve-tabs-item>${2:Tab 2}</nve-tabs-item>
    <nve-tabs-item>${3:Tab 3}</nve-tabs-item>
    <nve-tabs-item>${4:Tab 4}</nve-tabs-item>
    <nve-tabs-item disabled>disabled</nve-tabs-item>
  </nve-tabs>
  $0
</template>

<template
  name="Vertical Tabs"
  prefix="vertical-tabs"
  description="Tabs can be used as the foundation for a side menu by enabling vertical mode."
  type="pattern">
  <nve-tabs>
    <nve-tabs-item selected>${1:Tab 1}</nve-tabs-item>
    <nve-tabs-item>${2:Tab 2}</nve-tabs-item>
    <nve-tabs-item>${3:Tab 3}</nve-tabs-item>
    <nve-tabs-item>${4:Tab 4}</nve-tabs-item>
    <nve-tabs-item disabled>disabled</nve-tabs-item>
  </nve-tabs>
  $0
</template>

<template
  name="Tabs with Dot"
  prefix="tabs-with-dot"
  description="Dots and icons to tabs by slotting content."
  type="pattern">
  <nve-tabs>
    <nve-tabs-item selected>${1:Tab 1}</nve-tabs-item>
    <nve-tabs-item>${2:Tab 2}</nve-tabs-item>
    <nve-tabs-item>${3:Tab 3}</nve-tabs-item>
    <nve-tabs-item selected>
      ${4:Tab 4}
      <nve-dot aria-label="${5:10} notifications">${5:10}</nve-dot>
    </nve-tabs-item>
    <nve-tabs-item disabled>disabled</nve-tabs-item>
  </nve-tabs>
  $0
</template>

<template
  name="Grouped Tabs"
  prefix="tabs-group"
  description="Tabs group with slot-matched panels controlled by tab item commands."
  type="pattern">
  <nve-tabs-group id="${1:tab-group}">
    <nve-tabs>
      <nve-tabs-item selected command="--toggle" commandfor="${1:tab-group}" value="${2:overview}"
        >${3:Overview}</nve-tabs-item
      >
      <nve-tabs-item command="--toggle" commandfor="${1:tab-group}" value="${4:details}">${5:Details}</nve-tabs-item>
      <nve-tabs-item command="--toggle" commandfor="${1:tab-group}" value="${6:settings}">${7:Settings}</nve-tabs-item>
    </nve-tabs>
    <div slot="${2:overview}">${8:Overview content}</div>
    <div slot="${4:details}">${9:Details content}</div>
    <div slot="${6:settings}">${10:Settings content}</div>
  </nve-tabs-group>
  $0
</template>
