<!doctype html>
<html lang="en" nve-theme="dark" nve-transition="auto">
  <head>
    <title>Elements + Static Bundles</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements and JS Bundles." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" href="./node_modules/@nvidia-elements/core/dist/bundles/index.css" />
  </head>
  <body>
    <nve-page>
      <nve-page-header slot="header">
        <nve-logo slot="prefix" size="sm"></nve-logo>

      </nve-page-header>
      <nve-page-panel slot="left" size="sm">
        <nve-page-panel-header>
          <div nve-layout="row gap:xs align:vertical-center">Starters</div>
        </nve-page-panel-header>
        <nve-page-panel-content>

            </nve-menu-item>
            <nve-menu-item>
              <a href="../angular/">
                <img src="assets/angular.svg" width="18px" height="18px" alt="angular logo" />
                Angular
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../vue/">
                <img src="assets/vue.svg" width="18px" height="18px" alt="vue logo" />
                Vue
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../react/">
                <img src="assets/react.svg" width="18px" height="18px" alt="react logo" />

              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../solidjs/">
                <img src="assets/solidjs.svg" width="18px" height="18px" alt="solidjs logo" />

            </nve-menu-item>
            <nve-menu-item current="page">
              <a href="../bundles/">
                <img src="assets/javascript.svg" width="18px" height="18px" alt="javascript logo" />
                Bundles
              </a>
            </nve-menu-item>
          </nve-menu>
        </nve-page-panel-content>
      </nve-page-panel>
      <main nve-layout="column gap:lg pad:lg align:horizontal-stretch">
        <nve-breadcrumb>
          <nve-button><a href="../../../">Elements</a></nve-button>
          <nve-button><a href="./" target="_self">Starters</a></nve-button>

        <p nve-text="body">A simple starter using Elements and static bundles.</p>
        <ul nve-text="list" nve-layout="column gap:xs">
          <li>
            <a
              nve-text="link"
              target="_blank"

            >
          </li>
          <li>
            <a

              target="_blank"

            >
          </li>
          <li>
            <a

      import './node_modules/@nvidia-elements/core/dist/bundles/index.js';
