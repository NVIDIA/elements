<!doctype html>
<html lang="en" mlv-theme="dark">
  <head>
    <title>Elements + Buildless</title>
    <meta charset="UTF-8" />
    <meta name="view-transition" content="same-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements and TypeScript." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@elements/elements@latest/dist/index.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@elements/elements@latest/dist/inter.css" />
    <style>
      body:has(*:not(:defined)) * {
        visibility: hidden;
      }
    </style>
    <script type="importmap">
      {
        "imports": {
          "@elements/elements": "https://https://esm.sh/@elements/elements@latest",
          "@elements/elements/": "https://https://esm.sh/@elements/elements@latest/"
        }
      }
    </script>
    <script type="module">
      import '@elements/elements/app-header/define.js';
      import '@elements/elements/button/define.js';
      import '@elements/elements/breadcrumb/define.js';
      import '@elements/elements/drawer/define.js';
      import '@elements/elements/menu/define.js';
    </script>
  </head>
  <body>
    <mlv-app-header>
      <mlv-logo></mlv-logo>
      <h2 slot="title">Elements</h2>
      <mlv-button slot="nav-items" selected><a href="/elements/starters/buildless/">Starters</a></mlv-button>
      <mlv-button slot="nav-items"
        ><a href="https://NVIDIA.github.io/elements/api/" target="_blank">API</a></mlv-button
      >
      <mlv-button slot="nav-items"
        ><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></mlv-button
      >
      <mlv-button slot="nav-items"
        ><a href="https://elements-stage.nvidia.com/ui/elements-playground" target="_blank">Playground</a></mlv-button
      >
      <mlv-icon-button icon-name="switch-apps" slot="nav-actions"></mlv-icon-button>
    </mlv-app-header>
    <div mlv-layout="row" style="height: 100%">
      <mlv-drawer inline size="sm" style="--top: 48px; display: block">
        <mlv-drawer-header>
          <div mlv-layout="row gap:xs align:vertical-center">Starters</div>
        </mlv-drawer-header>
        <mlv-drawer-content>
          <mlv-menu>
            <mlv-menu-item current="page">
              <a href="/elements/starters/buildless/">
                <img src="assets/javascript.svg" width="18px" height="18px" alt="javascript logo" />
                Buildless
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/typescript/">
                <img src="assets/typescript.svg" width="18px" height="18px" alt="typescript logo" />
                TypeScript
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/angular/">
                <img src="assets/angular.svg" width="18px" height="18px" alt="angular logo" />
                Angular
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/vue/">
                <img src="assets/vue.svg" width="18px" height="18px" alt="vue logo" />
                Vue
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/react/">
                <img src="assets/react.svg" width="18px" height="18px" alt="react logo" />
                React
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/solidjs/">
                <img src="assets/solidjs.svg" width="18px" height="18px" alt="solidjs logo" />
                SolidJS
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <mlv-icon name="template"></mlv-icon>
              <a href="/elements/starters/mpa/">MPA</a>
            </mlv-menu-item>
          </mlv-menu>
        </mlv-drawer-content>
      </mlv-drawer>
      <main mlv-layout="column gap:lg pad-x:xl pad-y:md align:stretch full">
        <mlv-breadcrumb>
          <mlv-button><a href="/elements/starters/buildless/">Elements</a></mlv-button>
          <mlv-button><a href="/elements/starters/buildless/" target="_self">Starters</a></mlv-button>
          <span>Buildless</span>
        </mlv-breadcrumb>
        <h1 mlv-text="heading xl">Buildless</h1>
        <p mlv-text="body">A simple starter using Elements and a buildless CDN.</p>
        <ul mlv-text="list" mlv-layout="column gap:xs">
          <li>
            <a
              mlv-text="link"
              target="_blank"
              href="https://github.com/NVIDIA/elements/-/tree/main/projects/starters/buildless"
              >Source</a
            >
          </li>
          <li>
            <a
              mlv-text="link"
              target="_blank"
              href="https://NVIDIA.github.io/elements/api/?path=/docs/integrations-buildless--docs"
              >Documentation</a
            >
          </li>
        </ul>
      </main>
    </div>
  </body>
</html>
