<!doctype html>
<html lang="en" nve-theme="dark" nve-transition="auto">
  <head>
    <title>Elements + Buildless</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements and TypeScript." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/themes@latest/dist/fonts/inter.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/themes@latest/dist/index.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/themes@latest/dist/dark.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/styles@latest/dist/typography.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/styles@latest/dist/layout.css" />
    <link rel="stylesheet" type="text/css" href="https://https://esm.sh/@nvidia-elements/styles@latest/dist/view-transitions.css" />
    <script type="importmap">
      {
        "imports": {
          "@nvidia-elements/core": "https://https://esm.sh/@nvidia-elements/core@latest",
          "@nvidia-elements/core/": "https://https://esm.sh/@nvidia-elements/core@latest/"
        }
      }
    </script>
    <script type="module">
      import '@nvidia-elements/core/page/define.js';
      import '@nvidia-elements/core/page-header/define.js';
      import '@nvidia-elements/core/button/define.js';
      import '@nvidia-elements/core/breadcrumb/define.js';
      import '@nvidia-elements/core/drawer/define.js';
      import '@nvidia-elements/core/menu/define.js';
      import '@nvidia-elements/core/logo/define.js';
    </script>
  </head>
  <body>
    <nve-page>
      <nve-page-header slot="header">
        <nve-logo slot="prefix" size="sm"></nve-logo>
        <a slot="prefix" href="/elements/">Elements</a>
        <nve-button container="flat"
          ><a href="/elements/api/?path=/docs/about-installation--docs">Get Started</a></nve-button
        >
        <nve-button container="flat"
          ><a href="https://elements-stage.nvidia.com/ui/elements-playground" target="_blank">Playground</a></nve-button
        >
        <nve-button selected container="flat"><a href="/elements/starters/">Starters</a></nve-button>
        <nve-button container="flat"
          ><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></nve-button
        >
      </nve-page-header>
      <nve-page-panel slot="left" size="sm">
        <nve-page-panel-header>
          <div nve-layout="row gap:xs align:vertical-center">Starters</div>
        </nve-page-panel-header>
        <nve-page-panel-content>
          <nve-menu>
            <nve-menu-item>
              <a href="/elements/starters/typescript/">
                <img src="assets/typescript.svg" width="18px" height="18px" alt="typescript logo" />
                TypeScript
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="/elements/starters/eleventy/">
                <img src="assets/eleventy.svg" width="18px" height="18px" alt="eleventy logo" />
                Eleventy
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="/elements/starters/angular/">
                <img src="assets/angular.svg" width="18px" height="18px" alt="angular logo" />
                Angular
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="/elements/starters/vue/">
                <img src="assets/vue.svg" width="18px" height="18px" alt="vue logo" />
                Vue
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="/elements/starters/react/">
                <img src="assets/react.svg" width="18px" height="18px" alt="react logo" />
                React
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="/elements/starters/solidjs/">
                <img src="assets/solidjs.svg" width="18px" height="18px" alt="solidjs logo" />
                SolidJS
              </a>
            </nve-menu-item>
            <nve-menu-item current="page">
              <a href="/elements/starters/buildless/">
                <img src="assets/javascript.svg" width="18px" height="18px" alt="javascript logo" />
                Buildless
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <nve-icon name="template"></nve-icon>
              <a href="/elements/starters/mpa/">MPA</a>
            </nve-menu-item>
          </nve-menu>
        </nve-page-panel-content>
      </nve-page-panel>
      <main nve-layout="column gap:lg pad:lg align:horizontal-stretch">
        <nve-breadcrumb>
          <nve-button><a href="/elements/starters/">Elements</a></nve-button>
          <nve-button><a href="/elements/starters/buildless/" target="_self">Starters</a></nve-button>
          <span>Buildless</span>
        </nve-breadcrumb>
        <h1 nve-text="heading xl">Buildless</h1>
        <p nve-text="body">A simple starter using Elements and a buildless CDN.</p>
        <ul nve-text="list" nve-layout="column gap:xs">
          <li>
            <a
              nve-text="link"
              target="_blank"
              href="https://github.com/NVIDIA/elements/-/tree/main/projects/starters/buildless"
              >Source</a
            >
          </li>
          <li>
            <a
              nve-text="link"
              target="_blank"
              href="https://NVIDIA.github.io/elements/api/?path=/docs/integrations-buildless--docs"
              >Documentation</a
            >
          </li>
          <li>
            <a
              download
              nve-text="link"
              target="_blank"
              href="https://NVIDIA.github.io/elements/starters/download/buildless.zip"
              >Download</a
            >
          </li>
        </ul>
      </main>
    </nve-page>
  </body>
</html>
