<!doctype html>
<html lang="en" nve-theme="dark" nve-transition="auto">
  <head>
    <title>Elements + Multi Page App</title>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements in a Multi Page App." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" href="/index.css" />
    <script type="module" src="/index.ts"></script>
  </head>
  <body>
    <nve-page>
      <nve-page-header slot="header">
        <nve-logo slot="prefix" size="sm"></nve-logo>
        <a slot="prefix" href="../../">Elements</a>
        <nve-button container="flat"><a href="../../docs/about/getting-started/">Get Started</a></nve-button>
        <nve-button container="flat"
          ><a href="https://elements-stage.nvidia.com/ui/elements-playground" target="_blank">Playground</a></nve-button
        >
        <nve-button selected container="flat"><a href="../">Starters</a></nve-button>
        <nve-button container="flat"
          ><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></nve-button
        >
      </nve-page-header>
      <nve-page-panel slot="left" size="sm">
        <nve-page-panel-header>
          <div nve-layout="row gap:xs align:vertical-center">Starters</div>
        </nve-page-panel-header>
        <nve-page-panel-content>
          <nve-menu>
            <nve-menu-item>
              <a href="../typescript/">
                <img src="/typescript.svg" width="18px" height="18px" alt="typescript logo" />
                TypeScript
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../eleventy/">
                <img src="/eleventy.svg" width="18px" height="18px" alt="eleventy logo" />
                Eleventy
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../angular/">
                <img src="/angular.svg" width="18px" height="18px" alt="angular logo" />
                Angular
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../vue/">
                <img src="/vue.svg" width="18px" height="18px" alt="vue logo" />
                Vue
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../react/">
                <img src="/react.svg" width="18px" height="18px" alt="react logo" />
                React
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../solidjs/">
                <img src="/solidjs.svg" width="18px" height="18px" alt="solidjs logo" />
                SolidJS
              </a>
            </nve-menu-item>
            <nve-menu-item>
              <a href="../buildless/">
                <img src="/javascript.svg" width="18px" height="18px" alt="javascript logo" />
                Buildless
              </a>
            </nve-menu-item>
            <nve-menu-item current="page">
              <nve-icon name="template"></nve-icon>
              <a href="../mpa/">MPA</a>
            </nve-menu-item>
          </nve-menu>
        </nve-page-panel-content>
      </nve-page-panel>
      <main nve-layout="column gap:lg pad:lg align:horizontal-stretch">
        <nve-breadcrumb>
          <nve-button><a href=".">Elements</a></nve-button>
          <nve-button><a href="../" target="_self">Starters</a></nve-button>
          <span>MPA</span>
        </nve-breadcrumb>
        <h1 nve-text="heading xl">Multi Page App</h1>
        <nve-tabs>
          <nve-tabs-item selected><a href="./">Home</a></nve-tabs-item>
          <nve-tabs-item><a href="./about/">About</a></nve-tabs-item>
          <nve-tabs-item><a href="./settings/">Settings</a></nve-tabs-item>
        </nve-tabs>
        <p nve-text="body">A simple starter using Elements in a Multi Page App built with Vite.</p>
        <ul nve-text="list" nve-layout="column gap:xs">
          <li>
            <a
              nve-text="link"
              target="_blank"
              href="https://github.com/NVIDIA/elements/-/tree/main/projects/starters/mpa"
              >Source</a
            >
          </li>
          <li>
            <a
              nve-text="link"
              target="_blank"
              href="https://NVIDIA.github.io/elements/api/?path=/docs/integrations-typescript--docs"
              >Documentation</a
            >
          </li>
          <li>
            <a
              download
              nve-text="link"
              target="_blank"
              href="https://NVIDIA.github.io/elements/starters/download/mpa.zip"
              >Download</a
            >
          </li>
        </ul>
      </main>
    </nve-page>

</html>
