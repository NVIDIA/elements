<!doctype html>
<html lang="en" mlv-theme="dark">
  <head>
    <title>Elements + Multi Page App</title>
    <meta charset="UTF-8" />
    <meta name="view-transition" content="same-origin" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="A simple starter using Elements in a Multi Page App." />
    <link rel="shortcut icon" href="data:image/x-icon;," type="image/x-icon" />
    <link rel="stylesheet" href="/about/index.css" />
    <script type="module" src="/about/index.ts"></script>
  </head>
  <body>
    <mlv-app-header>
      <mlv-logo></mlv-logo>
      <h2 slot="title">Elements</h2>
      <mlv-button slot="nav-items" selected><a href="/elements/starters/buildless/">Starters</a></mlv-button>
      <mlv-button slot="nav-items"
        ><a href="https://NVIDIA.github.io/elements/api/" target="_blank">API</a></mlv-button
      >
      <mlv-button slot="nav-items"
        ><a href="https://github.com/NVIDIA/elements/" target="_blank">Gitlab</a></mlv-button
      >
      <mlv-button slot="nav-items"
        ><a href="https://elements-stage.nvidia.com/ui/elements-playground" target="_blank">Playground</a></mlv-button
      >
      <mlv-icon-button icon-name="switch-apps" slot="nav-actions"></mlv-icon-button>
    </mlv-app-header>
    <div mlv-layout="row" style="height: 100%">
      <mlv-drawer inline size="sm" style="--top: 48px; display: block">
        <mlv-drawer-header>
          <div mlv-layout="row gap:xs align:vertical-center">Starters</div>
        </mlv-drawer-header>
        <mlv-drawer-content>
          <mlv-menu>
            <mlv-menu-item>
              <a href="/elements/starters/buildless/">
                <img src="/javascript.svg" width="18px" height="18px" alt="javascript logo" />
                Buildless
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/typescript/">
                <img src="/typescript.svg" width="18px" height="18px" alt="typescript logo" />
                TypeScript
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/angular/">
                <img src="/angular.svg" width="18px" height="18px" alt="angular logo" />
                Angular
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/angular-legacy/" style="text-transform: none;">
                <img src="/angular-legacy.svg" width="18px" height="18px" alt="angular legacy logo" />
                Angular Legacy (v12/2021)
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/vue/">
                <img src="/vue.svg" width="18px" height="18px" alt="vue logo" />
                Vue
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/react/">
                <img src="/react.svg" width="18px" height="18px" alt="react logo" />
                React
              </a>
            </mlv-menu-item>
            <mlv-menu-item>
              <a href="/elements/starters/solidjs/">
                <img src="/solidjs.svg" width="18px" height="18px" alt="solidjs logo" />
                SolidJS
              </a>
            </mlv-menu-item>
            <mlv-menu-item current="page">
              <mlv-icon name="template"></mlv-icon>
              <a href="/elements/starters/mpa/">MPA</a>
            </mlv-menu-item>
          </mlv-menu>
        </mlv-drawer-content>
      </mlv-drawer>
      <main mlv-layout="column gap:lg pad-x:xl pad-y:md align:stretch full">
        <mlv-breadcrumb>
          <mlv-button><a href="/elements/starters/buildless/">Elements</a></mlv-button>
          <mlv-button><a href="/elements/starters/buildless/" target="_self">Starters</a></mlv-button>
          <mlv-button><a href="/elements/starters/mpa/" target="_self">MPA</a></mlv-button>
          <span>About</span>
        </mlv-breadcrumb>
        <h1 mlv-text="heading xl">Multi Page App</h1>
        <mlv-tabs>
          <mlv-tabs-item><a href="/elements/starters/mpa/">Home</a></mlv-tabs-item>
          <mlv-tabs-item selected><a href="/elements/starters/mpa/about/">About</a></mlv-tabs-item>
          <mlv-tabs-item><a href="/elements/starters/mpa/settings/">Settings</a></mlv-tabs-item>
        </mlv-tabs>
        <p mlv-text="body">About page content.</p>
      </main>
    </div>
  </body>
</html>
