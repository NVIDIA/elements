<style>
  html {
    background: var(--nve-sys-layer-shell-background, #0b0c0f) !important;
    color: var(--nve-sys-layer-canvas-color) !important;
    font-weight: var(--nve-ref-font-weight-regular) !important;
  }

  html,
  body,
  * {
    font-family: var(--nve-ref-font-family) !important;
  }

  .container {
    background: var(--nve-sys-layer-shell-background) !important;
  }

  [data-test-id='sb-preview-toolbar'] {
    background: var(--nve-sys-layer-shell-background) !important;
    border-bottom: var(--nve-ref-border-width-sm) solid var(--nve-ref-border-color-muted) !important;
    box-shadow: none !important;
  }
  
  /* only show subnav toolbar when viewing storymode. Hide when viewing docs/mdx views. */
  main:has(a[href*='--docs'][title='Skip to sidebar']) [data-test-id='sb-preview-toolbar'] {
    height: 0 !important;
  }

  .search-field {
    margin-top: 4px !important;
  }

  .css-1vsmsb1 {
    display: none !important;
  }

  /* hide the spammy storybook "Whats New" popup */
  .css-t70j46, .css-15wk7wb, .css-scdnn8, #sidebar-bottom-wrapper:has([href="/?path=/settings/whats-new"]) {
    display: none !important;
  }

  /* top nav item */
  [data-test-id='sb-preview-toolbar'] button {
    color: var(--nve-sys-interaction-color) !important;
    background: transparent !important;
    background-image: linear-gradient(color-mix(in oklab, var(--nve-sys-interaction-state-base) 100%, var(--nve-sys-interaction-state-mix) var(--nve-sys-interaction-state-ratio)) 0 0) !important;

    &:hover {
      --nve-sys-interaction-state-ratio: var(--nve-sys-interaction-state-ratio-hover);
    }

    &.css-1x6cwi2 {
      --nve-sys-interaction-state-ratio: 0%;
    }
  }

  .sidebar-item {
    background: transparent !important;
    background-image: linear-gradient(color-mix(in oklab, var(--nve-sys-interaction-state-base) 100%, var(--nve-sys-interaction-state-mix) var(--nve-sys-interaction-state-ratio)) 0 0) !important;
    color: var(--nve-sys-interaction-color) !important;
    border-radius: var(--nve-ref-border-radius-xs) !important;
    font-size: var(--nve-ref-font-size-200) !important;
    align-items: center !important;

    &:hover {
      --nve-sys-interaction-state-ratio: var(--nve-sys-interaction-state-ratio-hover);
    }

    &[disabled] {
      --nve-sys-interaction-state-ratio: var(--nve-sys-interaction-state-ratio-disabled);
    }

    &:active {
      --nve-sys-interaction-state-ratio: var(--nve-sys-interaction-state-ratio-active);
    }

    &[data-selected='true']:not(#about-getting-started--docs) {
      --nve-sys-interaction-state-ratio: 0%;
    }

    & svg[width='14'],
    & svg[width='12'] {
      display: none !important;
    }

    & a {
      padding-left: 26px;
    }
  }

  .css-h7e28b {
    background: none !important;
    color: var(--nve-sys-text-muted-color) !important;
    padding: 0 8px 0 4px !important;
    min-width: 97%;
  }

  .css-1qs63ah {
    font-weight: 500;
    text-transform: capitalize;
    font-size: 14px !important;
    margin-top: 2px !important;
    padding-block: 8px !important;
  }

  [data-selected='true'] .css-1xavl7t a {
    font-weight: 600;
  }

  [data-test-id='sb-preview-toolbar'] {
    & [title='Apply outlines to the preview'] {
      display: none !important;
    }

    & [title='Show addons'] {
      display: none !important;
    }

    & .css-c3junj {
      display: none !important;
    }
  } 

  .sidebar-subheading-action {
    display: none !important;
  }

  .css-gwq172 {
    margin-top: 0 !important;
  }

  .search-field {
    background: var(--nve-sys-interaction-background) !important;
    border-radius: var(--nve-ref-border-radius-sm) !important;
    border: var(--nve-ref-border-width-md) solid transparent !important;
    box-shadow: none !important;
  }

  #storybook-explorer-searchfield {
    padding: var(--nve-ref-size-100) var(--nve-ref-size-200) !important;
    font-size: var(--nve-ref-font-size-200) !important;
    height: auto !important;
    color: var(--nve-sys-interaction-color) !important;
    box-shadow: none !important;
  }

  #storybook-explorer-searchfield::placeholder {
    color: var(--nve-sys-text-muted-color) !important;
  }

  #storybook-explorer-menu {
    color: var(--nve-sys-interaction-color) !important;
  }

  .sidebar-header {
    display: none !important;
  }

  div:has(> nav.sidebar-container) {
    margin-top: 48px !important;
    border-right: var(--nve-ref-border-width-sm) solid var(--nve-ref-border-color-muted) !important;
  }

  main:has(#storybook-preview-iframe) {
    padding-top: 48px !important;
  }

  [title='Storybook'] svg {
    display: none !important;
  }

  [title='Storybook']::after {
    color: var(--nve-sys-text-emphasis-color);
    font-family: var(--nve-ref-font-family-inter);
    font-weight: var(--nve-ref-font-weight-semibold);
    font-size: var(--nve-ref-font-size-400);
    content: 'Elements';
    width: 175px !important;
  }

  a[title='Storybook'] {
    display: none !important;
  }

  .css-c3junj, /* top nav buttons */
  .css-1kk8lbh {
    display: none !important;
  }

  body:has(#system-options-drawer:popover-open) #storybook-preview-wrapper {
    background: var(--nve-sys-layer-canvas-background, #0b0c0f) !important;
    padding-right: 280px !important;
  }

  #storybook-preview-iframe {
    box-shadow: none !important;
  }

  @media (min-width: 600px) {
    .css-1f34q4w,
    .css-1486cn3,
    .css-p5p7wm,
    .css-14owk5e,
    .css-1w8t4uf,
    .css-1l1gp38,
    .css-18dug6q,
    .css-1f65213,
    body > #root > div {
      grid-template-rows: 1fr !important;
      grid-template-areas: "sidebar content content" !important;
    }

    .css-1uc5ojr {
      display: none !important;
    }
  }

  [data-item-id='internal-legacy-changelog--docs'] {
    display: none !important;
  }

  [data-popper-placement] {
    background: var(--nve-sys-layer-container-background) !important;
    color: var(--nve-sys-layer-container-color) !important;
  }

  [data-popper-placement] * {
    color: var(--nve-sys-layer-container-color) !important;
    border-bottom-color: var(--nve-sys-layer-container-background) !important;
  }

  .sidebar-container .css-d3imve {
    padding: var(--nve-ref-space-sm) !important;
  }

  .sidebar-item,
  .sidebar-item a {
    min-height: 30px !important;
    align-items: center !important;
  }

  .sidebar-item .css-99l9qv {
    margin-top: 4px !important;
  }

  .css-1sho4jx,
  #storybook-panel-root {
    display: none !important;
  }

  .css-1d1nb5w {
    border-right: var(--nve-ref-border-width-sm) solid var(--nve-ref-border-color-muted) !important;
  }
</style>
