<template
  name="Dropdown Snippet"
  prefix="dropdown-snippet"
  description="Generic dropdown element for rendering a variety of different content within a dropdown container."
  type="pattern">
  <mlv-button id="btn">${4:Trigger}</mlv-button>

  <mlv-dropdown anchor="btn" closable>
    <mlv-dropdown-header>
      <h3 mlv-text="heading semibold sm">${1:Title}</h3>
    </mlv-dropdown-header>
    <p mlv-text="body">${2:Content}</p>
    <mlv-dropdown-footer>
      <p mlv-text="body">${3:Footer Text}</p>
    </mlv-dropdown-footer>
  </mlv-dropdown>

  $0
</template>

<template
  name="Dropdown with Radio Snippet"
  prefix="dropdown-radio-snippet"
  description="Dropdown with radio select pattern"
  type="pattern">
  <mlv-button id="btn" mlv-control>completed <mlv-icon name="caret" direction="down" size="sm"></mlv-icon></mlv-button>

  <mlv-dropdown anchor="btn">
    <mlv-radio-group style="width: 250px">
      <label>${1:Sort By}</label>

      <mlv-radio>
        <label>${2:Completed}</label>
        <input type="radio" checked />
        <mlv-control-message>${3:latest completed tasks}</mlv-control-message>
      </mlv-radio>

      <mlv-radio>
        <label>${4:Failing}</label>
        <input type="radio" />
        <mlv-control-message>${5:latest failing tasks}</mlv-control-message>
      </mlv-radio>

      <mlv-radio>
        <label>${6:Status}</label>
        <input type="radio" />
        <mlv-control-message>${7:task status priority}</mlv-control-message>
      </mlv-radio>
    </mlv-radio-group>
  </mlv-dropdown>

  $0
</template>

<template
  name="Dropdown with Checkbox Snippet"
  prefix="dropdown-checkbox-snippet"
  description="Dropdown with checkbox select pattern"
  type="pattern">
  <mlv-button id="btn" mlv-control
    >test suites <mlv-icon name="caret" direction="down" size="sm"></mlv-icon
  ></mlv-button>

  <mlv-dropdown anchor="btn">
    <mlv-checkbox-group style="width: 250px">
      <label>${1:Test Suites}</label>

      <mlv-checkbox>
        <label>${2:Local}</label>
        <input type="checkbox" />
      </mlv-checkbox>

      <mlv-checkbox>
        <label>${3:Nightly}</label>
        <input type="checkbox" checked />
      </mlv-checkbox>

      <mlv-checkbox>
        <label>${4:Remote}</label>
        <input type="checkbox" />
      </mlv-checkbox>
    </mlv-checkbox-group>
  </mlv-dropdown>

  $0
</template>
