<template name="Button Group" prefix="button-group" description="Simple button group with three icons." type="pattern">
  <nve-button-group>
    <nve-icon-button icon-name="${1:copy}"></nve-icon-button>
    <nve-icon-button icon-name="${2:add-comment}"></nve-icon-button>
    <nve-icon-button icon-name="${3:download}"></nve-icon-button>
  </nve-button-group>
  $0
</template>

<template
  name="Button Group Rounded"
  prefix="button-group-rounded"
  description="Rounded button group with three icons."
  type="pattern">
  <nve-button-group container="rounded">
    <nve-icon-button selected icon-name="${1:image}"></nve-icon-button>
    <nve-icon-button icon-name="${2:add-comment}"></nve-icon-button>
    <nve-icon-button icon-name="${3:download}"></nve-icon-button>
  </nve-button-group>
</template>

<template
  name="Split Button"
  prefix="split-button"
  description="Divided button with primary and secondary actions."
  type="pattern">
  <nve-button-group>
    <nve-button>${1:Button Text}</nve-button>
    <nve-divider orientation="vertical"></nve-divider>
    <nve-icon-button icon-name="caret" size="sm" direction="down"></nve-icon-button>
  </nve-button-group>
  $0
</template>

<template
  name="Button Group Vertical"
  prefix="button-group-vertical"
  description="Simple vertical button group with three icon buttons."
  type="pattern">
  <nve-button-group orientation="vertical">
    <nve-icon-button icon-name="${1:copy}"></nve-icon-button>
    <nve-icon-button icon-name="${2:add-comment}"></nve-icon-button>
    <nve-icon-button icon-name="${3:download}"></nve-icon-button>
  </nve-button-group>
</template>
