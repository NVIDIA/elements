<template name="Search" prefix="search" description="Basic search with label and input" type="pattern">
  <nve-search>
    <label>${1:label}</label>
    <input type="search" />
  </nve-search>
</template>

<template name="Search" prefix="search-inline" description="Basic inline search" type="pattern">
  <nve-search>
    <input type="search" aria-label="${2:search}" placeholder="${3:search}" />
  </nve-search>
</template>
