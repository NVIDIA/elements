<template
  name="Alert Group Snippet"
  prefix="alert-group-snippet"
  description="Alert group with two alerts."
  type="pattern">
  <mlv-alert-group status="${1:accent}" container="${2:flat}" prominence="emphasis">
    <mlv-alert closable>${3:Alert Text}</mlv-alert>
    <mlv-alert closable>${4:Alert Text}</mlv-alert>
  </mlv-alert-group>

  $0
</template>

<template
  name="Alert with Action Snippet"
  prefix="alert-action-snippet"
  description="Alert with action button."
  type="pattern">
  <mlv-alert-group status="${1:accent}" container="${2:flat}" prominence="emphasis">
    <mlv-alert> ${3:Alert Text} <mlv-button slot="actions" container="flat">${4:OK!}</mlv-button> </mlv-alert>
  </mlv-alert-group>

  $0
</template>

<template
  name="Multiline Alert Snippet"
  prefix="multiline-alert-snippet"
  description="Alert text and preformatted code output."
  type="pattern">
  <mlv-alert-group status="danger">
    <mlv-alert>
      Session Paused:
      <div slot="content" mlv-layout="column gap:sm align:stretch">
        <p mlv-text="body sm">Failed to verify drives. <a href="#" mlv-text="link">Check Status</a></p>
        <mlv-divider style="--color: var(--mlv-sys-text-muted-color)"></mlv-divider>
        <pre mlv-text="code sm" style="background: transparent !important; margin: 0;">
10:06:01 AM [verify] update /virtual:/verify/
  10:06:11 AM [build] update /virtual:/build/
  10:06:22 AM [error] update /virtual:/error/ - failed to connect to remote
            </pre
        >
      </div>
    </mlv-alert>
  </mlv-alert-group>

  $0
</template>
