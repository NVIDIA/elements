<template name="Alert Group" prefix="alert-group" description="Alert group with two alerts." type="pattern">
  <nve-alert-group status="${1:accent}" container="${2:flat}" prominence="emphasis">
    <nve-alert closable>${3:Alert Text}</nve-alert>
    <nve-alert closable>${4:Alert Text}</nve-alert>
  </nve-alert-group>
  $0
</template>

<template name="Alert with Action" prefix="alert-action" description="Alert with action button." type="pattern">
  <nve-alert-group status="${1:accent}" container="${2:flat}" prominence="emphasis">
    <nve-alert> ${3:Alert Text} <nve-button slot="actions" container="flat">${4:OK!}</nve-button> </nve-alert>
  </nve-alert-group>
  $0
</template>

<template
  name="Multiline Alert "
  prefix="multiline-alert"
  description="Alert text and preformatted code output."
  type="pattern">
  <nve-alert-group status="danger">
    <nve-alert>
      Session Paused:
      <div slot="content" nve-layout="column gap:sm align:stretch">
        <p nve-text="body sm">Failed to verify drives. <a href="#" nve-text="link">Check Status</a></p>
        <nve-divider style="--color: var(--nve-sys-text-muted-color)"></nve-divider>
        <pre nve-text="code sm" style="background: transparent !important; margin: 0;">
10:06:01 AM [verify] update /virtual:/verify/
  10:06:11 AM [build] update /virtual:/build/
  10:06:22 AM [error] update /virtual:/error/ - failed to connect to remote
            </pre
        >
      </div>
    </nve-alert>
  </nve-alert-group>
  $0
</template>
