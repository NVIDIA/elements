<template
  name="Dialog Snippet"
  prefix="dialog-snippet"
  description="Dialog is a component that appears above main content. A modal dialog is used to display critical information that requires users attention."
  type="pattern">
  <mlv-dialog size="${6:md}" closable>
    <mlv-dialog-header>
      <h3 mlv-text="heading semibold">${1:Title}</h3>
    </mlv-dialog-header>
    <p mlv-text="body">${2:Content}</p>
    <mlv-dialog-footer>
      <mlv-button>${3:Cancel}</mlv-button>
      <mlv-button interaction="${4:emphasis}">${5:OK}</mlv-button>
    </mlv-dialog-footer>
  </mlv-dialog>

  $0
</template>
