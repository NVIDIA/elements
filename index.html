<head>
  <meta charset="utf-8">

  <meta name="Description" content="Put your description here.">

  <style>
    html,
    body {
      margin: 40px;
      display: flex;
      flex-direction: column;

      font-family: sans-serif;
      background-color: #ededed;
    }

    api-viewer {
      width: 800px;
    }

    ::part(demo-output) {
      max-height: 600px;
      overflow: auto;
    }
  </style>
  <title>MagLev Elements</title>

  <script type="module">
    import 'api-viewer-element';
  </script>
  <script type="module" src="/src/index.ts"></script>

  <script>
    function switchDarkMode(darkMode) {
      console.log(darkMode);
      darkMode && document.body.classList.add('dark');
      !darkMode && document.body.classList.remove('dark');
    }

    window.matchMedia('(prefers-color-scheme: dark)').addListener(
      e => switchDarkMode(e.matches)
    );
  </script>
</head>

<body>
  <h1>Maglev UI Components</h1>

  <api-viewer src="./custom-elements.json" section="demo"></api-viewer>

  <iframe style="border: 1px solid rgba(0, 0, 0, 0.1);" width="800" height="450" src="https://www.figma.com/embed?embed_host=share&url=https%3A%2F%2Fwww.figma.com%2Ffile%2Fu92dX33lnPVzC9o4SfgK3R%2FMagLev-Product-System-2.0%3Fnode-id%3D35%253A733" allowfullscreen></iframe>
