<style>
  body {
    background: var(--nve-sys-layer-shell-background) !important;
    color: var(--nve-sys-layer-canvas-color) !important;
    font-family: var(--nve-ref-font-family-inter) !important;
    font-weight: var(--nve-ref-font-weight-regular) !important;
  }

  /* main shell */
  #root > div > [role='main'] {
    height: 100vh !important;
    top: 0 !important;
    right: 0 !important;
    width: auto !important;
  }

  .sto-1va4tas {
    box-shadow: none !important;
    border-radius: 0 !important;
  }

  /* main viewport */
  #panel-tab-content,
  .sto-10ro1m {
    top: 52px !important;
    height: calc(100% - 52px) !important;
    background: var(--nve-sys-layer-shell-background) !important;
  }

  /* top bar nav */
  .os-viewport-native-scrollbars-invisible .os-content {
    background: var(--nve-sys-layer-shell-background) !important;
  }

  .sto-1mi4vlx,
  .sto-p1dfi6,
  .sto-17imonf,
  .sto-rfiy1p,
  .sto-1ic2gvo {
    height: 52px !important;
  }

  /* top bar nav buttons */
  .os-viewport-native-scrollbars-invisible .os-content button,
  .os-viewport-native-scrollbars-invisible .os-content a,
  .os-viewport-native-scrollbars-invisible .os-content .sto-p1dfi6 div {
    align-self: center !important;
    margin: 0 !important;
    display: flex !important;
  }

  /* API Argstable */
  .docblock-argstable tr > th,
  .docblock-argstable tr > td {
    background: var(--nve-sys-layer-container-background) !important;
  }

  [title='Storybook'] {
    display: flex !important;
    align-items: center !important;
    padding: 0 !important;
  }

  [title='Storybook']::before {
    content: '';
    background-image: url('./assets/elements-icon-128.png');
    background-size: 23px 23px;
    width: 23px;
    height: 23px;
  }


  [title='Storybook'] svg {
    display: none !important;
  }

  [title='Storybook']::after {
    color: var(--nve-sys-layer-container-color);
    font-family: var(--nve-ref-font-family-inter);
    font-weight: var(--nve-ref-font-weight-semibold);
    font-size: var(--nve-ref-font-size-400);
    content: 'MagLev Elements';
    padding: 10px;
    width: 175px !important;
  }

  svg[color='primary'] {
    color: var(--nve-sys-accent-primary-background) !important;
  }

  .os-content {
    background: var(--nve-sys-layer-container-background) !important;
  }

  .os-content button.sto-17imonf,
  .os-content button.sto-1l38861 { /* selected/active toolbar buttons */
    color: var(--nve-sys-interaction-default-selected-color) !important;
    border-bottom-color: var(--nve-sys-interaction-default-selected-background) !important;
  }

  .sidebar-container .os-content {
    background: var(--nve-sys-layer-shell-background) !important;
  }

  .sidebar-item {
    color: var(--nve-sys-layer-canvas-color) !important;
    padding-top: 6px !important;
    padding-bottom: 6px !important;
    font-size: 14px !important;
  }

  .sidebar-item:hover {
    background: var(--nve-sys-interaction-default-hover-background) !important;
    color: var(--nve-sys-interaction-default-hover-color) !important;
  }

  .sidebar-item[data-selected='true'] {
    background: var(--nve-sys-interaction-default-selected-background) !important;
    color: var(--nve-sys-interaction-default-selected-color) !important;
  }

  .sidebar-subheading {
    padding: 0 !important;
  }

  /* popovers */
  #docs-root ~ [style*='position: absolute'] {
    background: var(--nve-sys-layer-container-background) !important;
    color: var(--nve-sys-layer-container-color) !important;
  }

  #docs-root ~ [style*='position: absolute'] * {
    color: var(--nve-sys-layer-container-color) !important;
    border-bottom-color: var(--nve-sys-layer-container-background) !important;
  }
</style>
